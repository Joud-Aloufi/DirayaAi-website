<section class="profile-section">
  <div class="profile-card">
    <div class="profile-header">
      <div class="profile-avatar" id="profile-avatar"></div>
      <h2 id="welcome-name" data-i18n="profile_loading">جاري التحميل...</h2>
    </div>

    <div class="profile-info">
      <div class="input-group profile-input">
        <label for="first-name-input" data-i18n="profile_fname_lbl">الاسم الأول</label>
        <input type="text" id="first-name-input">
      </div>
      
      <div class="input-group profile-input">
        <label for="last-name-input" data-i18n="profile_lname_lbl">الاسم الأخير</label>
        <input type="text" id="last-name-input">
      </div>

      <div class="input-group profile-input">
        <label for="uni-id-input" data-i18n="profile_uni_id_lbl">الرقم الجامعي (غير قابل للتعديل)</label>
        <input type="text" id="uni-id-input" disabled class="disabled-field" dir="ltr">

      <div class="input-group profile-input">

        <label for="phone-input" data-i18n="profile_phone_lbl">رقم الجوال</label>

      <div class="input-group profile-input">
        <label for="role-input" data-i18n="profile_role_lbl">الدور</label>
        <input type="text" id="role-input" disabled class="disabled-field">
      </div>

      <hr class="profile-divider">
      <div class="password-title-wrapper">
        <h3 class="profile-section-title" data-i18n="profile_pass_title">تغيير كلمة المرور</h3>
      </div>

      <div class="input-group profile-input">
        <label for="current-pass-input" data-i18n="profile_current_pass">كلمة المرور الحالية</label>
        <div class="pass-wrapper">
          <input type="password" id="current-pass-input" dir="ltr">
          <button type="button" class="toggle-pass-btn" title="إظهار/إخفاء كلمة المرور" aria-label="إظهار أو إخفاء كلمة المرور">

          </button>
        </div>
      </div>

      <div class="input-group profile-input">
        <label for="new-pass-input" data-i18n="profile_new_pass">كلمة المرور الجديدة</label>
        <div class="pass-wrapper">
          <input type="password" id="new-pass-input" dir="ltr">
          <button type="button" class="toggle-pass-btn" title="إظهار/إخفاء كلمة المرور" aria-label="إظهار أو إخفاء كلمة المرور">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
        
        <div class="password-meter-container">
            <div class="password-segment"></div>
            <div class="password-segment"></div>
            <div class="password-segment"></div>
            <div class="password-segment"></div>
        </div>
        <div class="password-text" id="profile-password-text" data-i18n="auth_pass_meter">قوة كلمة المرور</div>
      </div>

      <div class="input-group profile-input">
        <label for="confirm-pass-input" data-i18n="profile_confirm_pass">تأكيد كلمة المرور الجديدة</label>
        <div class="pass-wrapper">
          <input type="password" id="confirm-pass-input" dir="ltr">
          <button type="button" class="toggle-pass-btn" title="إظهار/إخفاء كلمة المرور" aria-label="إظهار أو إخفاء كلمة المرور">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
