<!DOCTYPE html>
<!--============================================================================
DIRAYAAI - AUTHENTICATION PAGE
Description: صفحة المصادقة الأساسية، تحتوي على نماذج تسجيل الدخول للمستخدمين الحاليين وإنشاء حسابات جديدة للطلاب.
============================================================================-->
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirayaAI | تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="login-main">
<a href="index.html" class="back-home-btn" data-i18n="auth_back_home">الصفحة الرئيسية ←</a>

<div class="login-container">

<div class="login-brand">
    <div class="brand-circle">
        <img src="./assets/robot.png" alt="شعار DirayaAI" width="80">
    </div>
    <h1 class="brand-title">DirayaAI</h1>
</div>

<div class="login-form-wrapper">
<div class="form-card">

<div id="signupWrapper" class="hidden">
<div class="form-header">
    <div class="icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
    </div>
    <h2 data-i18n="auth_signup_title">إنشاء حساب</h2>
    <div id="response-msg" class="success-msg" data-i18n="auth_success_signup">تم إنشاء الحساب بنجاح!</div>
    <div id="general-error" class="error-msg"></div>
</div>

<form id="signupForm" action="auth_handler.php?action=signup" method="POST" class="auth-form" novalidate>
<div class="input-row">
    <div class="input-group">
        <label for="f_name" data-i18n="auth_fname_lbl">الاسم الأول</label>
        <input type="text" id="f_name" name="f_name" class="standard-input" required>
    </div>
    <div class="input-group">
        <label for="l_name" data-i18n="auth_lname_lbl">الاسم الأخير</label>
        <input type="text" id="l_name" name="l_name" class="standard-input" required>
    </div>
</div>

<div class="input-group">
    <label for="uni_id" data-i18n="auth_uni_id_lbl">الرقم الجامعي</label>
    <input type="text" id="uni_id" name="uni_id" class="standard-input" dir="ltr" data-i18n="auth_uni_id_ph" placeholder="******44" required>
</div>

<div class="input-group">
    <label for="user_email" data-i18n="auth_email_lbl">البريد الإلكتروني</label>
    <input type="email" id="user_email" name="user_email" class="standard-input" dir="ltr" data-i18n="auth_email_ph" placeholder="example@domain.com" required>
    <div id="email-error" class="error-msg">هذا البريد الإلكتروني مسجل مسبقاً.</div>
</div>

<div class="input-group">
    <label for="user_phone" data-i18n="auth_phone_lbl">رقم الجوال (اختياري)</label>
    <input type="tel" id="user_phone" name="user_phone" class="standard-input" dir="ltr" data-i18n="auth_phone_ph" placeholder="05xxxxxxxx" pattern="^05\d{8}$" maxlength="10">
</div>

<div class="input-group">
    <label for="password" data-i18n="auth_pass_lbl">كلمة المرور</label>
    <div class="pass-wrapper">
        <input type="password" id="password" name="user_pass" class="standard-input" dir="ltr" data-i18n="auth_pass_ph" placeholder="8 خانات على الأقل" required minlength="8">
        <button type="button" class="toggle-pass-btn" aria-label="إظهار أو إخفاء كلمة المرور" title="إظهار/إخفاء كلمة المرور"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
    </div>
    <div class="password-meter-container">
        <div class="password-segment"></div><div class="password-segment"></div><div class="password-segment"></div><div class="password-segment"></div><div class="password-segment"></div>
    </div>
    <div id="password-text" class="password-text" data-i18n="auth_pass_meter">قوة كلمة المرور</div>
</div>

<div class="input-group">
    <label for="confirm_pass" data-i18n="auth_confirm_pass_lbl">تأكيد كلمة المرور</label>
   <div class="pass-wrapper">
        <input type="password" id="confirm_pass" class="standard-input" dir="ltr" data-i18n="auth_confirm_pass_ph" placeholder="أعيد إدخال كلمة المرور" required>
        <button type="button" class="toggle-pass-btn" aria-label="إظهار أو إخفاء كلمة المرور" title="إظهار/إخفاء كلمة المرور"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
    </div>
    <div id="pass-error" class="error-msg" data-i18n="auth_err_pass_match">كلمات المرور غير متطابقة.</div>
</div>

<button type="submit" class="submit-btn" data-i18n="auth_signup_btn">إنشاء حساب</button>

<p class="switch-text">
<span data-i18n="auth_have_account">لديك حساب بالفعل؟</span>
<button type="button" id="showLoginBtn" class="link-btn" data-i18n="auth_login_title">تسجيل الدخول</button>
</p>
</form>
</div>

<div id="loginWrapper">
<div class="form-header">
    <div class="icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div> 
    <h2 data-i18n="auth_login_title">تسجيل الدخول</h2>
    <div id="login-error" class="error-msg" data-i18n="auth_err_invalid_creds">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>
</div>

<form id="loginForm" action="auth_handler.php?action=login" method="POST" class="auth-form" novalidate>
<div class="input-group">
    <label for="login_email" data-i18n="auth_email_lbl">البريد الإلكتروني</label>
    <input type="email" id="login_email" name="login_email" class="standard-input" dir="ltr" data-i18n="auth_email_ph" placeholder="example@domain.com" required>
</div>

<div class="input-group">
    <label for="login_pass" data-i18n="auth_pass_lbl">كلمة المرور</label>
    <div class="pass-wrapper">
    <input type="password" id="login_pass" name="login_pass" class="standard-input" dir="ltr" data-i18n="auth_pass_login_ph" placeholder="أدخل كلمة المرور الخاصة بك" required>
    <button type="button" class="toggle-pass-btn" aria-label="إظهار أو إخفاء كلمة المرور" title="إظهار/إخفاء كلمة المرور"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
    </div>
</div>

<button type="submit" class="submit-btn" data-i18n="auth_login_btn">تسجيل الدخول</button>

<p class="switch-text">
<span data-i18n="auth_no_account">ليس لديك حساب؟</span>
<button type="button" id="showSignupBtn" class="link-btn" data-i18n="auth_signup_title">إنشاء حساب</button>
</p>
</form>

</div>
</div>
</div>
</div>
<button id="langToggleBtn" class="lang-toggle-btn floating-lang-btn">English</button>
</main>
<script src="translations.js"></script>
<script src="main.js"></script>
</body>
</html>
